<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- iPhone-first: cover the notch/home-indicator area, lock zoom for an app feel -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a12" />

  <!-- Installable PWA / iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="hiaOS" />
  <meta name="format-detection" content="telephone=no" />

  <title>hiaOS</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Animated liquid-glass wallpaper -->
  <div id="wallpaper"></div>
  <div id="wallpaper-blobs">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>
  <div id="noise"></div>

  <!-- The OS mounts here -->
  <div id="app"></div>

  <!-- Left-edge taskbar (rail) + pull handle + expanded launchpad -->
  <button id="tb-handle" aria-label="Open taskbar"></button>
  <nav id="taskbar" aria-label="Taskbar"></nav>
  <div id="scrim"></div>
  <section id="launchpad" aria-label="All apps"></section>

  <!-- Floating assistant orb -->
  <button id="orb" class="hidden" aria-label="Ask hia"></button>

  <!-- Onboarding stage (first run) -->
  <div id="onboarding" class="hidden"></div>

  <div id="toast-wrap"></div>

  <script src="js/icons.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ollama.js"></script>
  <script src="js/apps.js"></script>
  <script src="js/shell.js"></script>
</body>
</html>
